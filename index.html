<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мой список желаний</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">Wishlist</p>
        <h1>Мой список желаний</h1>
      </section>

      <section class="panel" aria-label="Добавить подарок">
        <div class="form">
          <input id="title" type="text" placeholder="Название" autocomplete="off" />
          <input id="link" type="url" placeholder="Ссылка" autocomplete="off" />
          <input id="price" type="text" placeholder="Цена" autocomplete="off" />
          <button id="addBtn" type="button">Добавить</button>
        </div>
      </section>

      <section class="wishlist" id="wishlist" aria-live="polite"></section>
    </main>

    <script type="module" src="script.js"></script>
  </body>
</html>
